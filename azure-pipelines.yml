# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: 'nivi-agent-pool'

steps:
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    options: '-DforkCount=1 -DargLine="-Xmx1024m -Xms512m"'

- task: Docker@2
  inputs:
    containerRegistry: 'niviacr-connection'
    repository: 'spring-boot'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)